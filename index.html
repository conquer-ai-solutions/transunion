<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Sales Intelligence & AI Coaching — TransUnion</title>
  <link rel="icon" type="image/x-icon" href="https://www.transunion.com/etc.clientlibs/transunion/clientlibs/clientlib-trubrand/resources/images/favicons/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg-light:#FAFBFC;
  --bg-dark:#0F1119;
  --s1-light:#FFFFFF;
  --s1-dark:#1A1F2E;
  --s2-light:#F5F6F8;
  --s2-dark:#252D3D;
  --s3-light:#EAECF0;
  --s3-dark:#3A424F;
  --bd-light:rgba(0,0,0,0.08);
  --bd-dark:rgba(255,255,255,0.08);
  --bdh-light:rgba(0,0,0,0.12);
  --bdh-dark:rgba(255,255,255,0.12);
  --tu:#00A8CB;
  --tud:#007A95;
  --tul:#33BCDA;
  --tut:rgba(0,168,203,0.08);
  --tug:rgba(0,168,203,0.15);
  --t1-light:#1A1D2B;
  --t1-dark:#FFFFFF;
  --t2-light:#6B7280;
  --t2-dark:#A0A9B8;
  --t3-light:#9CA3AF;
  --t3-dark:#6B7280;
  --ok:#10B981;
  --okt:rgba(16,185,129,0.08);
  --al:#F59E0B;
  --alt:rgba(245,158,11,0.08);
  --er:#EF4444;
  --ert:rgba(239,68,68,0.08);
  --r:12px;
  --rs:8px;
  --nh:60px;
  --sh-light:2px 4px 12px rgba(0,0,0,0.06);
  --sh-dark:0 4px 16px rgba(0,0,0,0.3);
  --bg:var(--bg-light);
  --s1:var(--s1-light);
  --s2:var(--s2-light);
  --s3:var(--s3-light);
  --bd:var(--bd-light);
  --bdh:var(--bdh-light);
  --t1:var(--t1-light);
  --t2:var(--t2-light);
  --t3:var(--t3-light);
  --sh:var(--sh-light);
}
html.dark {
  --bg:var(--bg-dark);
  --s1:var(--s1-dark);
  --s2:var(--s2-dark);
  --s3:var(--s3-dark);
  --bd:var(--bd-dark);
  --bdh:var(--bdh-dark);
  --t1:var(--t1-dark);
  --t2:var(--t2-dark);
  --t3:var(--t3-dark);
  --sh:var(--sh-dark);
}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background-color 300ms,color 300ms}
h1{font-size:24px;font-weight:700;letter-spacing:-.02em;color:var(--t1);text-shadow:0 1px 2px rgba(0,0,0,0.05)}
h2{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--t1)}
.nav{position:fixed;top:0;left:0;right:0;height:var(--nh);background:var(--s1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.1);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;gap:16px}
.nav-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.nav-logo{height:24px;filter:none;transition:transform 200ms}
.nav-logo:hover{transform:scale(1.05)}
.nav-div{width:1px;height:24px;background:var(--bd);transition:background-color 300ms}
.nav-title{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--tu);font-family:monospace}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:8px 14px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:transparent;white-space:nowrap;transition:all 200ms ease;display:flex;align-items:center;gap:8px;position:relative}
.nav-tab::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--tu);transform:scaleX(0);transform-origin:left;transition:transform 300ms cubic-bezier(.4,0,.2,1)}
.nav-tab:hover{color:var(--t1);background:var(--s2)}
.nav-tab.active{color:var(--tu);background:var(--tut);font-weight:600}
.nav-tab.active::after{transform:scaleX(1)}
.tcnt{background:var(--er);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:10px;font-family:monospace;min-width:18px;text-align:center;line-height:1;animation:pulse-badge 2s ease-in-out infinite;display:inline-block}
.tcnt.m{background:var(--s3);color:var(--t3);animation:none}
@keyframes pulse-badge{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.8}}
.nav-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-badge{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tu);background:var(--tut);border:1px solid rgba(0,168,203,.2);border-radius:6px;padding:4px 10px;font-family:monospace;transition:all 200ms}
.theme-toggle{width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--s2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 200ms}
.theme-toggle:hover{border-color:var(--tu);color:var(--tu);background:var(--tut)}
.btn-ic{width:36px;height:36px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--s2);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 200ms;position:relative;overflow:hidden}
.btn-ic::before{content:"";position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(0,168,203,0.2);border-radius:50%;transform:translate(-50%,-50%);transition:width 600ms,height 600ms}
.btn-ic:active::before{width:100px;height:100px}
.btn-ic:hover{border-color:var(--tu);color:var(--tu);background:var(--tut)}
.main{margin-top:var(--nh);min-height:calc(100vh - var(--nh));background:var(--bg)}
.view{display:none;animation:fade-in 400ms ease-out forwards}
.view.active{display:block}
@keyframes fade-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.wrap{padding:32px 24px;max-width:1280px;margin:0 auto}
.ph{margin-bottom:28px;animation:fade-in 600ms ease-out}
.ph h1{margin-bottom:8px;color:var(--t1)}
.ph p{color:var(--t2);font-size:14px;font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.mc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh);transition:all 300ms cubic-bezier(.4,0,.2,1);animation:card-enter 600ms ease-out backwards;transform-origin:top center}
.mc:nth-child(1){animation-delay:100ms}
.mc:nth-child(2){animation-delay:150ms}
.mc:nth-child(3){animation-delay:200ms}
.mc:nth-child(4){animation-delay:250ms}
@keyframes card-enter{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.mc:hover{border-color:var(--bdh);box-shadow:0 12px 24px rgba(0,168,203,0.15);transform:translateY(-4px)}
.mv{font-size:32px;font-weight:700;letter-spacing:-.03em;line-height:1;margin-bottom:8px;color:var(--t1);font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums}
.mv-counter{display:inline-block}
.ml{font-size:12px;color:var(--t2);font-weight:500;transition:color 300ms}
.ms{font-size:11px;color:var(--t3);margin-top:6px;font-family:monospace;font-weight:400}
.mc.cr .mv{color:var(--er)}
.mc.ok .mv{color:var(--ok)}
.mc.tu .mv{color:var(--tu)}
.mc.al .mv{color:var(--al)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:16px;animation:fade-in 700ms ease-out}
.sh h2{margin:0;color:var(--t1)}
.frow{display:flex;gap:8px;flex-wrap:wrap}
.fb{padding:6px 14px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;transition:all 200ms cubic-bezier(.4,0,.2,1);white-space:nowrap;position:relative;overflow:hidden}
.fb::before{content:"";position:absolute;inset:0;background:var(--tut);opacity:0;transition:opacity 300ms}
.fb:hover{border-color:var(--tu);color:var(--tu);background:var(--tut)}
.fb.active{background:var(--tu);border-color:var(--tu);color:#fff;font-weight:600;box-shadow:0 4px 12px rgba(0,168,203,0.3)}
.alist{display:flex;flex-direction:column;gap:10px}
.ar{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all 300ms cubic-bezier(.4,0,.2,1);display:grid;grid-template-columns:10px 1fr auto auto;align-items:center;gap:14px;box-shadow:var(--sh);animation:list-enter 400ms ease-out backwards}
.ar:nth-child(1){animation-delay:100ms}
.ar:nth-child(2){animation-delay:150ms}
.ar:nth-child(3){animation-delay:200ms}
.ar:nth-child(4){animation-delay:250ms}
.ar:nth-child(5){animation-delay:300ms}
.ar:nth-child(6){animation-delay:350ms}
.ar:nth-child(7){animation-delay:400ms}
.ar:nth-child(n+8){animation-delay:450ms}
@keyframes list-enter{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.ar:hover{border-color:var(--tu);box-shadow:0 8px 20px rgba(0,168,203,0.2);transform:translateY(-2px)}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor;animation:pulse-dot 3s ease-in-out infinite}
.pdot.critical{animation:pulse-dot-fast 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.1)}}
@keyframes pulse-dot-fast{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.15)}}
.aid{font-size:11px;font-weight:600;color:var(--t3);font-family:monospace;letter-spacing:.03em;margin-bottom:3px}
.atype{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--t1)}
.ameta{font-size:12px;color:var(--t2);font-weight:500}
.abadges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.atime{font-size:12px;color:var(--t3);font-family:monospace;font-weight:500;white-space:nowrap}
.badge{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:6px;font-family:monospace;white-space:nowrap;display:inline-block;transition:all 200ms;animation:badge-in 400ms ease-out backwards}
.badge:nth-child(1){animation-delay:0ms}
.badge:nth-child(2){animation-delay:100ms}
.badge:nth-child(3){animation-delay:200ms}
@keyframes badge-in{from{opacity:0;scale:0.8}to{opacity:1;scale:1}}
.empty{text-align:center;padding:80px 24px;color:var(--t3);font-size:14px;animation:fade-in 500ms ease-out}
.empty-icon{font-size:48px;margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.dv{padding:32px 24px;max-width:900px;margin:0 auto;animation:fade-in 400ms ease-out}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--t2);background:none;border:none;cursor:pointer;padding:0;margin-bottom:28px;transition:all 200ms;font-weight:500}
.back:hover{color:var(--tu);transform:translateX(-4px)}
.dh{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap}
.dm{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.sc2{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);padding:14px;box-shadow:var(--sh);transition:all 300ms;animation:signal-card-in 500ms ease-out backwards;cursor:default}
.sc2:nth-child(1){animation-delay:100ms}
.sc2:nth-child(2){animation-delay:150ms}
.sc2:nth-child(3){animation-delay:200ms}
.sc2:nth-child(4){animation-delay:250ms}
.sc2:nth-child(5){animation-delay:300ms}
.sc2:nth-child(6){animation-delay:350ms}
@keyframes signal-card-in{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.sc2:hover{border-color:var(--tu);box-shadow:0 4px 16px rgba(0,168,203,0.12)}
.sk{font-size:10px;color:var(--t3);font-family:monospace;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:600}
.sv{font-size:14px;font-weight:700;font-family:monospace;color:var(--t1);font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums}
.rat{background:var(--tut);border-left:4px solid var(--tu);border-radius:var(--rs);padding:14px 16px;font-size:13px;line-height:1.7;margin-bottom:16px;color:var(--t1);font-weight:500;animation:fade-in 500ms ease-out}
.acbox{background:var(--okt);border:1px solid rgba(16,185,129,.2);border-radius:var(--rs);padding:14px 16px;margin-bottom:16px;animation:fade-in 500ms ease-out}
.acbox .alb{font-size:9px;font-weight:700;color:var(--ok);font-family:monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.acbox p{font-size:14px;font-weight:600;color:var(--t1);margin:0;line-height:1.6}
.dbar{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;box-shadow:var(--sh);animation:fade-in 600ms ease-out;transition:all 300ms}
.btn{padding:10px 22px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 200ms cubic-bezier(.4,0,.2,1);display:inline-flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.02em;position:relative;overflow:hidden}
.btn::before{content:"";position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,0.2);border-radius:50%;transform:translate(-50%,-50%);transition:width 600ms,height 600ms}
.btn:active::before{width:300px;height:300px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.b-cl{background:var(--tu);color:#fff;box-shadow:0 2px 8px rgba(0,168,203,0.2)}
.b-cl:hover:not(:disabled){background:var(--tud);box-shadow:0 6px 16px rgba(0,168,203,0.4);transform:translateY(-2px)}
.b-ok{background:var(--ok);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,0.2)}
.b-ok:hover:not(:disabled){background:#059669;box-shadow:0 6px 16px rgba(16,185,129,0.4);transform:translateY(-2px)}
.b-cn{background:var(--s2);color:var(--t2);border:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.b-cn:hover{border-color:var(--tu);color:var(--tu);background:var(--tut);box-shadow:0 4px 12px rgba(0,168,203,0.2);transform:translateY(-2px)}
.tow{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;pointer-events:none;z-index:150}
.toast{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 16px;font-size:12px;font-weight:600;color:var(--t1);box-shadow:0 8px 24px rgba(0,0,0,0.12);pointer-events:auto;animation:toast-in 400ms cubic-bezier(.34,.1,.68,.55) forwards;font-family:'Inter',system-ui;white-space:nowrap;max-width:320px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden}
@keyframes toast-in{from{opacity:0;transform:translateX(400px) translateY(0)}to{opacity:1;transform:translateX(0)}}
.toast::before{content:"";position:absolute;bottom:0;left:0;height:2px;background:var(--tu);animation:toast-progress 3s linear forwards}
@keyframes toast-progress{from{width:100%}to{width:0}}
.toast.ok{border-color:var(--ok);background:linear-gradient(135deg,rgba(16,185,129,0.1) 0%,var(--s1) 100%)}
.toast.ok::before{background:var(--ok)}
.toast.in{border-color:var(--tu);background:linear-gradient(135deg,rgba(0,168,203,0.1) 0%,var(--s1) 100%)}
.toast.in::before{background:var(--tu)}
.kbd-hint{position:fixed;bottom:24px;left:24px;font-size:11px;color:var(--t3);background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);padding:8px 12px;font-family:monospace;cursor:pointer;transition:all 200ms;z-index:50}
.kbd-hint:hover{border-color:var(--tu);color:var(--tu);background:var(--tut)}

/* Overview Cards */
.overview-headline{margin-bottom:56px;animation:slideUp 0.5s ease-out}
.overview-overline{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--tu);text-transform:uppercase;margin-bottom:16px;opacity:0.9}
.overview-h1{font-size:48px;font-weight:800;color:var(--t1);line-height:1.1;margin-bottom:20px;letter-spacing:-1px}
.overview-sub{font-size:16px;color:var(--t3);line-height:1.7;max-width:680px;font-weight:400}
.problem-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-bottom:56px}
.problem-card{background:var(--s1);padding:28px;border:1px solid var(--bd);border-radius:12px;box-shadow:var(--sh);transition:all 0.3s ease-out;position:relative;overflow:hidden;animation:slideUp 0.5s ease-out backwards}
.problem-card::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(0,168,203,0.05),transparent);opacity:0;transition:opacity 0.3s ease-out}
.problem-card:nth-child(1){animation-delay:0.1s}
.problem-card:nth-child(2){animation-delay:0.15s}
.problem-card:nth-child(3){animation-delay:0.2s}
.problem-card:hover{border-color:var(--tu);box-shadow:0 16px 40px rgba(0,168,203,0.15);transform:translateY(-6px)}
.problem-card:hover::before{opacity:1}
.problem-card-icon{width:32px;height:32px;color:var(--tu);margin-bottom:16px;display:block;transition:transform 0.3s ease-out}
.problem-card:hover .problem-card-icon{transform:scale(1.15) rotate(5deg)}
.problem-card-title{font-size:17px;font-weight:700;color:var(--t1);margin-bottom:12px}
.problem-card-body{font-size:14px;color:var(--t3);line-height:1.6}
.case-callout{background:linear-gradient(135deg,rgba(0,168,203,0.08),rgba(51,188,218,0.04));border:2px solid var(--tu);border-radius:12px;padding:28px;margin-bottom:40px;backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,168,203,0.1);animation:slideUp 0.5s ease-out 0.35s backwards}
.case-callout-label{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--tu);text-transform:uppercase;margin-bottom:12px;opacity:0.9}
.case-callout-text{font-size:16px;color:var(--t2);line-height:1.7}
.problem-cta{display:flex;flex-direction:column;align-items:center;gap:16px;animation:slideUp 0.5s ease-out 0.4s backwards}
.problem-cta-sub{font-size:13px;color:var(--t3);font-weight:500}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Coaching Hub */
.coach-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px}
.coach-perf{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:32px;box-shadow:var(--sh);animation:fade-in 500ms ease-out}
.coach-score{font-size:28px;font-weight:800;color:var(--tu);margin-bottom:8px}
.coach-ring{width:120px;height:120px;border-radius:50%;background:conic-gradient(var(--tu) 0deg,var(--tu) 280deg,var(--s2) 280deg);display:flex;align-items:center;justify-content:center;margin:20px 0}
.coach-ring-val{font-size:32px;font-weight:800;color:var(--t1)}
.coach-cards{display:flex;flex-direction:column;gap:16px;margin-top:24px}
.coach-card{background:var(--s1);border-left:4px solid var(--tu);border-radius:var(--rs);padding:16px;box-shadow:var(--sh);animation:card-enter 500ms ease-out backwards}
.coach-card:nth-child(1){animation-delay:200ms}
.coach-card:nth-child(2){animation-delay:250ms}
.coach-card:nth-child(3){animation-delay:300ms}
.coach-title{font-weight:700;font-size:13px;color:var(--t1);margin-bottom:6px}
.coach-body{font-size:12px;color:var(--t2);line-height:1.6}
.coach-peer{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:20px;box-shadow:var(--sh);animation:fade-in 600ms ease-out}
.coach-chart{display:flex;align-items:flex-end;gap:12px;height:160px;margin:24px 0}
.coach-bar{flex:1;background:var(--tut);border-radius:4px 4px 0 0;position:relative;transition:all 200ms}
.coach-bar:hover{background:var(--tu)}
.coach-bar-label{position:absolute;bottom:-24px;left:0;right:0;font-size:11px;text-align:center;color:var(--t2);font-weight:600;white-space:nowrap}

function animateCounters(){
  document.querySelectorAll(".mv-counter").forEach(el=>{
    const target=parseInt(el.dataset.target);
    let current=0;
    const inc=Math.ceil(target/50);
    const iv=setInterval(()=>{
      current=Math.min(current+inc,target);
      el.textContent=current;
      if(current===target)clearInterval(iv);
    },30);
  });
}

function getFiltered(){
  const all=[...S.signals].sort((a,b)=>{const o={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};return(o[a.priority]??9)-(o[b.priority]??9)});
  return S.filter==="all"?all:all.filter(s=>s.priority===S.filter.toUpperCase());
}

function setFilter(f){S.filter=f;renderDash()}

function aRow(s){
  const col={CRITICAL:"#EF4444",HIGH:"#F59E0B",MEDIUM:"#00A8CB",LOW:"#10B981"};

  container.innerHTML=`
    <div class="skeleton-msg"><div class="sk-avatar skeleton-loading"></div><div class="sk-lines"><div class="sk-line short skeleton-loading"></div><div class="sk-line long skeleton-loading"></div></div></div>
    <div class="skeleton-msg"><div class="sk-avatar skeleton-loading"></div><div class="sk-lines"><div class="sk-line short skeleton-loading"></div><div class="sk-line medium skeleton-loading"></div></div></div>
    <div class="skeleton-msg"><div class="sk-avatar skeleton-loading"></div><div class="sk-lines"><div class="sk-line short skeleton-loading"></div><div class="sk-line long skeleton-loading"></div><div class="sk-line medium skeleton-loading"></div></div></div>`;

  function buildCard(m){
    if(m.type==='card'&&m.data){
      let healthRow=m.data.health?`<tr><td>Health Score</td><td><span style="color:${m.data.health.includes('↓')?'#E74C3C':'#10B981'};font-weight:600">${m.data.health}</span></td></tr>`:'';
      return `<div class="teams-adaptive-card"><div class="teams-card-title">${m.content}</div><table class="teams-card-table">${m.data.signals?`<tr><td>Total Signals Today</td><td><strong>${m.data.signals}</strong></td></tr><tr><td>🔴 Critical</td><td>${m.data.critical} accounts</td></tr><tr><td>🟡 High Priority</td><td>${m.data.high} accounts</td></tr><tr><td>🟢 Expansion Opps</td><td>${m.data.expansion} accounts</td></tr>`:''}${m.data.ce?`<tr><td>Client Executive</td><td>${m.data.ce}</td></tr>`:''}${m.data.revenue?`<tr><td>Annual Revenue</td><td><strong>${m.data.revenue}</strong></td></tr>`:''}${healthRow}${m.data.ies?`<tr><td>IEs Assigned</td><td>${m.data.ies}</td></tr>`:''}${m.data.recent?m.data.recent.map(r=>`<tr><td>${r.label}</td><td>${r.value}</td></tr>`).join(''):''}</table><div class="teams-card-actions"><button class="teams-action-btn primary">View Details</button><button class="teams-action-btn">Add to Watch</button></div></div>`;}
    if(m.type==='coaching'){return `<div class="teams-adaptive-card coaching-card"><div class="teams-card-title" style="color:#10B981">💡 ${m.content}</div><div style="font-size:13px;color:#374151;line-height:1.7;margin:10px 0">${m.data.insight}</div><div style="font-size:12px;background:rgba(16,185,129,0.12);padding:10px 12px;border-radius:6px;color:#065F46;font-weight:500;line-height:1.5">💭 <strong>Recommended approach:</strong> ${m.data.action}</div></div>`;}
    if(m.type==='competitive'){return `<div class="teams-adaptive-card competitive-card"><div class="teams-card-title" style="color:#D97706">${m.content}</div><table class="teams-card-table">${m.data.rows.map(r=>`<tr><td>${r.competitor}</td><td>${r.activity} <span style="display:inline-block;margin-left:8px;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;background:${r.risk==='High'?'#FEE2E2':r.risk==='Medium'?'#FEF3C7':'#D1FAE5'};color:${r.risk==='High'?'#991B1B':r.risk==='Medium'?'#92400E':'#065F46'}">${r.risk}</span></td></tr>`).join('')}</table><div class="teams-card-actions"><button class="teams-action-btn primary">Track Competitors</button><button class="teams-action-btn">Share with Team</button></div></div>`;}
    if(m.type==='confirm'){return `<div class="teams-adaptive-card confirm-card"><div class="teams-card-title" style="color:#10B981">${m.content}</div><table class="teams-card-table"><tr><td>Meeting</td><td><strong>${m.data.meeting}</strong></td></tr><tr><td>Date</td><td>${m.data.date}</td></tr><tr><td>Attendees</td><td>${m.data.attendees.join(', ')}</td></tr></table><div style="font-size:12px;color:#6B7280;margin-top:10px;display:flex;align-items:center;gap:6px"><span>📎</span> ${m.data.preRead}</div><div class="teams-card-actions"><button class="teams-action-btn primary">Accept</button><button class="teams-action-btn">Tentative</button><button class="teams-action-btn">Decline</button></div></div>`;}
    return '';
  }

  function buildReactions(reactions){
    if(!reactions||!reactions.length)return '';
    return `<div class="teams-reactions">${reactions.map(r=>`<span class="teams-reaction">${r.emoji} <span class="r-count">${r.count}</span></span>`).join('')}</div>`;
  }

  function buildThread(thread){
    if(!thread)return '';
    return `<div class="teams-thread"><div class="thread-avatars">${thread.avatars.map(a=>`<div class="t-av" style="background:${a.color}">${a.initials}</div>`).join('')}</div><span class="thread-count">${thread.count} replies</span></div>`;
  }

  function buildMessage(m){
    const presence=m.isBot?'':'<div class="presence"></div>';
    const avatarStyle=m.isBot?'':`style="background:linear-gradient(135deg,${m.color},${m.color}cc)"`;
    return `<div class="teams-message-group" id="msg-${messages.indexOf(m)}">
      <div class="teams-avatar ${m.isBot?'bot':''}" ${avatarStyle}>${m.avatar}${presence}</div>
      <div class="teams-content">
        <div class="teams-message-header">
          <span class="teams-sender">${m.sender}</span>
          ${m.isBot?'<span class="teams-badge">BOT</span>':''}
          <span class="teams-timestamp">${m.timestamp}</span>
        </div>
        ${!m.type?`<div class="teams-message-text">${m.content}</div>`:''}
        ${buildCard(m)}
        ${buildReactions(m.reactions)}
        ${buildThread(m.thread)}
      </div>
    </div>`;
  }

  function showTypingIndicator(sender,avatar,color,isBot){
    const avStyle=isBot?`background:linear-gradient(135deg,#6264A7,#8B8EC7)`:`background:${color}`;
    const el=document.createElement('div');
    el.className='teams-typing-indicator';
    el.innerHTML=`<div class="typing-avatar" style="${avStyle}">${avatar}</div><div class="teams-typing-bubble"><div class="teams-typing-dot"></div><div class="teams-typing-dot"></div><div class="teams-typing-dot"></div></div><span class="teams-typing-name">${sender} is typing...</span>`;
    container.appendChild(el);
    setTimeout(()=>el.classList.add('visible'),20);
    container.scrollTop=container.scrollHeight;
    return el;
  }

  // Progressive loading sequence
  setTimeout(()=>{
    container.innerHTML='';
    let delay=0;
    const baseDelay=1800;
    const typingDuration=2200;

    messages.forEach((m,idx)=>{
      // Show typing indicator
      setTimeout(()=>{
        const typingEl=showTypingIndicator(m.sender,m.avatar,m.color,m.isBot);
        // After typing, replace with message
        setTimeout(()=>{
          typingEl.remove();
          const msgHtml=buildMessage(m);
          container.insertAdjacentHTML('beforeend',msgHtml);
          const msgEl=document.getElementById('msg-'+idx);
          setTimeout(()=>msgEl.classList.add('visible'),30);
          container.scrollTop=container.scrollHeight;

          // After the 5th message (coaching insight), show new messages divider
          if(idx===5){
            setTimeout(()=>{
              const divider=document.createElement('div');
              divider.className='teams-new-divider';
              divider.innerHTML='<div class="nd-line"></div><div class="nd-dot"></div><div class="nd-label">New</div><div class="nd-line"></div>';
              container.appendChild(divider);
              setTimeout(()=>divider.classList.add('visible'),30);
              container.scrollTop=container.scrollHeight;
            },400);
          }
        },typingDuration+(m.type?800:0));
      },delay);
      // Human messages: shorter pause. Bot cards: longer pause. Vary slightly for realism.
      const humanPause=m.isBot?0:Math.random()*600;
      delay+=baseDelay+typingDuration+(m.type?1400:500)+humanPause;
    });

    // Final typing indicator that stays
    setTimeout(()=>{
      showTypingIndicator("Sales Intelligence Bot","SIB","#6264A7",true);
    },delay+800);
  },1200);
}

function renderSettings(){document.getElementById("view-settings").innerHTML=`<div class="wrap" style="max-width:700px"><div class="ph"><h1>About Sales Intelligence & AI Coaching</h1><p>Proactive account intelligence, competitive awareness, and scaled mentorship for TransUnion's sales teams</p></div><div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:32px;box-shadow:var(--sh);animation:fade-in 500ms ease-out"><h2 style="margin-bottom:16px">Platform Overview</h2><div style="line-height:1.8;color:var(--t2);margin-bottom:32px"><p style="margin-bottom:12px"><strong>Sales Intelligence & AI Coaching Platform</strong> delivers proactive market signals, unified account data, and scaled mentorship to 300+ sales representatives across TransUnion's consumer lending vertical. This interface demonstrates three core capabilities:</p><h3 style="font-weight:700;margin-top:20px;margin-bottom:12px">1. Proactive Signal Push</h3><p style="margin-bottom:12px">AI continuously scans external sources (news, earnings, leadership, competitive intel) and pushes relevant intelligence to reps every 3 days. Example: "Block Inc. laid off 40% of headcount 2 weeks ago. Your IEs: Marcus (Identity), Sarah (Credit Data), Wei (Software). Suggested action: relationship check-in within 48 hours."</p><h3 style="font-weight:700;margin-top:20px;margin-bottom:12px">2. Account Health Dashboard</h3><p style="margin-bottom:12px">Unified view of each account: revenue trends, products deployed, contract renewal dates, pipeline activity, last contact date, health score. External signals (news, earnings, leadership changes) linked to decision-making contacts. CRM data gaps filled with market data.</p><h3 style="font-weight:700;margin-top:20px;margin-bottom:12px">3. AI Coaching Agent</h3><p style="margin-bottom:12px">Identifies struggling accounts (volume decline >10%), flags at-risk relationships (no contact >30 days), surfaces peer benchmarks (top performers cross-sell at 3.2x rate). Suggests specific actions: "Your peer grew similar account via Identity Verification cross-sell. Consider QBR."</p></div><h2 style="margin-bottom:16px">Organization Model</h2><div style="margin-bottom:32px"><p style="margin-bottom:12px"><strong>Client Executives (CEs):</strong> Account ambassadors responsible for overall relationship health, strategic alignment, and go-to-market execution across multiple product lines.</p><p style="margin-bottom:12px"><strong>Industry Executives (IEs):</strong> Product specialists (3-7 per CE) who drive implementation and adoption within their domain (Identity Verification, Credit Data, Fraud Analytics, Software).</p><p><strong>Challenge:</strong> Annual client reassignments wipe institutional knowledge. New CEs/IEs onboard without context. Signals get missed. Relationships suffer.</p></div><h2 style="margin-bottom:16px">The Demo</h2><div style="margin-bottom:32px"><p style="margin-bottom:12px">This interface shows:</p><ul style="margin-left:20px"><li>8 real-world account signals (market events, earnings, leadership changes, competitive intel, volume declines)</li><li>Account intelligence dashboard with CE/IE assignments, revenue, health scores</li><li>AI coaching hub with personalized recommendations and peer benchmarks</li><li>Live Team collaboration channel showing sales team coordination in response to signals</li><li>Dark mode and responsive design for mobile-first workflows</li></ul></div><h2 style="margin-bottom:16px">Key Signals Demonstrated</h2><div style="margin-bottom:32px"><div style="display:flex;gap:12px;margin-bottom:8px;padding:8px;border-radius:var(--rs);background:var(--ert)"><div style="color:var(--er);margin-top:2px">⚠</div><span><strong>Organizational Changes:</strong> Layoffs, leadership departures, strategic shifts that impact your contacts</span></div><div style="display:flex;gap:12px;margin-bottom:8px;padding:8px;border-radius:var(--rs);background:var(--alt)"><div style="color:var(--al);margin-top:2px">📈</div><span><strong>Financial Performance:</strong> Earnings beats, revenue growth, division performance — upsell opportunities</span></div><div style="display:flex;gap:12px;margin-bottom:8px;padding:8px;border-radius:var(--rs);background:var(--tut)"><div style="color:var(--tu);margin-top:2px">🎯</div><span><strong>Competitive Activity:</strong> Competitor meetings, RFPs, expansion plans — retention/growth risk</span></div><div style="display:flex;gap:12px;padding:8px;border-radius:var(--rs);background:var(--okt)"><div style="color:var(--ok);margin-top:2px">📊</div><span><strong>Volume Trends:</strong> Decline signals + peer benchmarks = coaching recommendations</span></div></div></div></div>`}

function showSettings(){renderSettings();showView("settings")}

function toast(msg,type="in"){const c=document.getElementById("toasts"),t=document.createElement("div");t.className="toast "+type;t.innerHTML=`<span style="flex:1">${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.style.animation="none";t.style.opacity="0";t.style.transition="opacity 300ms"},2800);setTimeout(()=>t.remove(),3200)}

window.addEventListener("DOMContentLoaded",init);
</script>
