*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

  --s2:var(--s2-light);
  --s3:var(--s3-light);
  --bd:var(--bd-light);
  --bdh:var(--bdh-light);
  --t1:var(--t1-light);
  --t2:var(--t2-light);
  --t3:var(--t3-light);
  --sh:var(--sh-light);
}
html.dark {
  --bg:var(--bg-dark);
  --s1:var(--s1-dark);
  --s2:var(--s2-dark);
  --s3:var(--s3-dark);
  --bd:var(--bd-dark);

.overview-headline { margin-bottom: 56px; animation: slideUp 0.5s ease-out; }

.problem-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 24px; margin-bottom: 56px;
}

.problem-card {
  background: var(--s1); padding: 28px;
  border: 1px solid var(--bd); border-radius: 12px;
  box-shadow: var(--sh);
  transition: all 0.3s ease-out;
  position: relative;
  overflow: hidden;
  animation: slideUp 0.5s ease-out backwards;
}

.problem-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(0,168,203,0.05), transparent);
  opacity: 0;
  transition: opacity 0.3s ease-out;
}

.problem-card:nth-child(1) { animation-delay: 0.1s; }
.problem-card:nth-child(2) { animation-delay: 0.15s; }
.problem-card:nth-child(3) { animation-delay: 0.2s; }
.problem-card:nth-child(4) { animation-delay: 0.25s; }
.problem-card:nth-child(5) { animation-delay: 0.3s; }

.problem-card:hover {
  border-color: var(--tu);
  box-shadow: 0 16px 40px rgba(0,168,203,0.15);
  transform: translateY(-6px);
}

.problem-card:hover::before { opacity: 1; }

.problem-card-icon {
  width: 32px; height: 32px; color: var(--tu);
  margin-bottom: 16px; display: block;
  transition: transform 0.3s ease-out;
}

.problem-card:hover .problem-card-icon { transform: scale(1.15) rotate(5deg); }

.problem-card-title { font-size: 17px; font-weight: 700; color: var(--t1); margin-bottom: 12px; }
.problem-card-body { font-size: 14px; color: var(--t3); line-height: 1.6; margin-bottom: 20px; }

.problem-card-stat-label { font-size: 12px; color: var(--t2); font-weight: 600; letter-spacing: 0.3px; }

.case-callout {
  background: linear-gradient(135deg, rgba(0,168,203,0.08), rgba(51,188,218,0.04));
  border: 2px solid var(--tu);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 40px;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 24px rgba(0,168,203,0.1);
  animation: slideUp 0.5s ease-out 0.35s backwards;
}

.case-callout-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; color: var(--tu); text-transform: uppercase; margin-bottom: 12px; opacity: 0.9; }
.case-callout-text { font-size: 16px; color: var(--t2); line-height: 1.7; }

.problem-cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  animation: slideUp 0.5s ease-out 0.4s backwards;
}

.problem-cta-sub { font-size: 13px; color: var(--t3); font-weight: 500; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

"ALT-0041":{risk_type:"Card Not Present Fraud",urgency:"HIGH",confidence:.93,recommendation:"BLOCK",rationale:"IP risk score of 0.91 combined with geographic mismatch — cardholder in GB, transaction routed through Nigeria — is a strong CNP fraud indicator. Device fingerprint is unrecognised (NEW_DEVICE) and transaction amount £4,750 is 32× average spend of £145.50. 3DS authentication failed and addresses do not match.",key_signals:["IP risk: 0.91","GB → NG mismatch","NEW_DEVICE","£4,750 vs £145.50 avg","3DS: not authenticated"],suggested_action:"Block transaction immediately. Place hold on card. Contact cardholder on registered mobile to verify.",false_positive_probability:.06,regulatory_note:"Cross-border transaction over £3,000 — document decision rationale for AML record-keeping."},

function showView(n){

function animateCounters(){
  document.querySelectorAll(".mv-counter").forEach(el=>{
    const target=parseInt(el.dataset.target);
    let current=0;
    const inc=Math.ceil(target/50);
    const iv=setInterval(()=>{
      current=Math.min(current+inc,target);
      el.textContent=current;
      if(current===target)clearInterval(iv);
    },30);
  });
}

function getFiltered(){
  const all=[...S.alerts].sort((a,b)=>{const o={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};if(a.status==="pending"&&b.status!=="pending")return -1;if(a.status!=="pending"&&b.status==="pending")return 1;return(o[a.priority]??9)-(o[b.priority]??9)});
  return S.filter==="all"?all:all.filter(a=>a.status===S.filter);
}

function setFilter(f){S.filter=f;renderDash()}

function aRow(a){
  const pc=P[a.priority]||P.LOW;
  const sigVal=Object.values(a.sig)[0]||"";
  const sc=a.status==="confirmed"?"sc":a.status==="corrected"?"sx":a.status==="auto_resolved"?"sa":"";

  return`<div class="ar ${sc}" onclick="openAlert('${a.id}')">

  <div><div class="aid">${a.id}</div><div class="atype">${TL[a.type]}</div><div class="ameta">${a.source} · ${a.cust.seg} · ${a.cust.cc}${sigVal?" · "+sigVal:""}</div></div>

}

function sigCards(sig){
  return Object.entries(sig).map(([k,v])=>{
    const sv=String(v).toLowerCase();
    let rc="";
    if(["fail","0.91","0.95","0.78","9","7","new_device"].some(x=>sv.includes(x)))rc="rh";
    else if(["partial","0.41","0.62"].some(x=>sv===x||sv.includes(x)))rc="rm";
    else if(["known_device","yes","0.05","0.08","1","2"].some(x=>sv===x||sv.startsWith(x)))rc="ro";
    return`<div class="sc2"><div class="sk">${k.replace(/_/g," ")}</div><div class="sv ${rc}">${v}</div></div>`;
  }).join("");
}

function dbarHTML(a){
  if(a.status==="confirmed")return`<div class="ddone">✓ <strong style="color:var(--ok)">Confirmed</strong> — AI classification accepted and logged.</div>`;
  if(a.status==="corrected")return`<div class="ddone">✏ <strong style="color:var(--al)">Corrected</strong> — Your classification logged as training signal.</div>`;
  if(a.status==="auto_resolved")return`<div class="ddone">⚡ <strong style="color:var(--t2)">Auto-Resolved</strong> — High confidence, low false positive risk. Logged automatically.</div>`;
  if(!a.ai)return`<div class="di">Run AI classification first, then confirm or correct the result.</div>`;
  return`<div class="di"><strong>AI Classification: ${a.ai.risk_type}</strong><small>${Math.round(a.ai.confidence*100)}% confidence — Review above and confirm or override.</small></div>

function runClassify(id){
  const a=S.alerts.find(x=>x.id===id);if(!a)return;
  const btn=document.getElementById("cBtn");if(btn){btn.disabled=true;btn.textContent="Classifying…"}
  document.getElementById("aiB").innerHTML=`<div class="aiproc"><div class="spin"></div><div style="display:flex;gap:12px;margin-top:16px;justify-content:center"><div style="flex:1;max-width:200px"><div class="skeleton skeleton-bar"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:80%"></div></div></div><div class="pstep" id="ps">Initialising analysis…</div></div>`;
  const steps=["Ingesting signal fields…","Checking risk databases…","Analysing velocity patterns…","Evaluating device fingerprint…","Cross-referencing geographic signals…","Generating classification…","Computing confidence…","Finalizing analysis…"];
  let i=0;const iv=setInterval(()=>{const e=document.getElementById("ps");if(e&&i<steps.length)e.textContent=steps[i++]},200);
  setTimeout(()=>{
    clearInterval(iv);
    const r=MOCK[id];if(!r)return;
    a.ai=r;
    if(r.recommendation==="AUTO_RESOLVE"&&r.confidence>=.90){a.status="auto_resolved";logEntry(a,"auto_resolved",null);toast(id+" auto-resolved ("+Math.round(r.confidence*100)+"% confidence)","in")}
    save();updateCounts();
    document.getElementById("aiB").innerHTML=aiHTML(r);
    document.getElementById("dBar").innerHTML=dbarHTML(a);
    setTimeout(()=>{const f=document.getElementById("cf");if(f)f.style.width=(r.confidence*100)+"%"},50);
    const b=document.getElementById("cBtn");if(b)b.style.display="none";
  },1600);
}

function confirmAlert(id){
  const a=S.alerts.find(x=>x.id===id);if(!a||!a.ai)return;
  a.status="confirmed";logEntry(a,"confirmed",null);save();updateCounts();
  document.getElementById("dBar").innerHTML=dbarHTML(a);
  toast(id+" confirmed — logged to audit trail","ok");
}

function openModal(id){document.getElementById("mId").value=id;document.getElementById("mReason").value="";document.getElementById("correctModal").classList.remove("hidden")}

function closeModal(){document.getElementById("correctModal").classList.add("hidden")}

function submitCorrection(){
  const id=document.getElementById("mId").value;
  const ty=document.getElementById("mType").value;
  const ur=document.getElementById("mUrg").value;
  const re=document.getElementById("mReason").value.trim();
  if(!re){toast("Please provide a reason for the correction","er");return}
  const a=S.alerts.find(x=>x.id===id);if(!a)return;
  a.status="corrected";a.correction={ty,ur,re};
  logEntry(a,"corrected",{ty,ur,re});save();updateCounts();closeModal();
  document.getElementById("dBar").innerHTML=dbarHTML(a);
  toast(id+" corrected — training signal logged","in");
}

function logEntry(a,action,corr){
  S.log.unshift({ts:new Date().toISOString(),id:a.id,type:TL[a.type],priority:a.priority,action,aiRisk:a.ai?.risk_type||"—",aiConf:a.ai?Math.round(a.ai.confidence*100)+"%":"—",aiRec:a.ai?.recommendation||"—",corrTo:corr?`${corr.ty} · ${corr.ur}`:null,corrReason:corr?.re||null});
  localStorage.setItem("tu_l",JSON.stringify(S.log));updateCounts();
}

      <div style="display:flex;gap:12px;margin-bottom:8px;padding:8px;border-radius:var(--rs);background:var(--alt)"><div style="width:8px;height:8px;border-radius:50%;background:var(--al);flex-shrink:0;margin-top:6px"></div><span><strong>Synthetic Identity Fraud</strong> — thin credit file, SSN anomalies, failed verification</span></div>
      <div style="display:flex;gap:12px;margin-bottom:8px;padding:8px;border-radius:var(--rs);background:var(--alt)"><div style="width:8px;height:8px;border-radius:50%;background:var(--al);flex-shrink:0;margin-top:6px"></div><span><strong>Identity Verification Failure</strong> — liveness check fail, low face match score</span></div>
      <div style="display:flex;gap:12px;padding:8px;border-radius:var(--rs);background:var(--tut)"><div style="width:8px;height:8px;border-radius:50%;background:var(--tu);flex-shrink:0;margin-top:6px"></div><span><strong>First Party Fraud</strong> — high dispute velocity, chargeback pattern, deliberate claims</span></div>
    </div>
    <h2 style="margin-bottom:16px">AI Autonomy Level</h2>
    <p style="margin-bottom:32px">This system operates at <strong>Level 2 — Augment</strong>. AI classifies and recommends actions. Human analysts confirm or override. Automatic resolution only for very high confidence, low false-positive-risk alerts.</p>
    <h2 style="margin-bottom:16px">UX Enhancements</h2>

    <ul style="margin-left:20px;margin-bottom:32px">

</div>`;
}

function showSettings(){
  renderSettings();
  showView("settings");
}

function exportCSV(){
  const h=["Time","Alert ID","Type","AI Classification","Confidence","Recommendation","Analyst Action","Corrected To","Reason"];
  const r=S.log.map(e=>[new Date(e.ts).toISOString(),e.id,e.type,e.aiRisk,e.aiConf,e.aiRec,e.action,e.corrTo||"",e.corrReason||""]);
  const csv=[h,...r].map(row=>row.map(v=>`"${v}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="transunion_audit_"+new Date().toISOString().split("T")[0]+".csv";a.click();
}

function clearLog(){if(!confirm("Clear the entire audit log?"))return;S.log=[];localStorage.removeItem("tu_l");updateCounts();renderAudit()}

function ago(iso){const d=(Date.now()-new Date(iso))/1000;if(d<60)return Math.round(d)+"s ago";if(d<3600)return Math.round(d/60)+"m ago";return Math.round(d/3600)+"h ago"}

function toast(msg,type="in"){const c=document.getElementById("toasts"),t=document.createElement("div");t.className="toast "+type;t.innerHTML=`<span style="flex:1">${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.style.animation="none";t.style.opacity="0";t.style.transition="opacity 300ms"},2800);setTimeout(()=>t.remove(),3200)}

window.addEventListener("DOMContentLoaded",init);
